services:
  transferv:
    image: ghcr.io/ydtoloza/transferv:latest
    container_name: transferv
    ports:
      - "${TRANSFERV_PORT:-8080}:8080"
    environment:
      TRANSFERV_DATA_DIR: /data
    volumes:
      - ${TRANSFERV_DATA_DIR:-./data}:/data
      # Para montar llaves SSH: descomenta y ajusta la ruta
      # - ~/.ssh:/keys:ro
    restart: unless-stopped

services:
  transferv:
    image: ${TRANSFERV_IMAGE:-ghcr.io/ydtoloza/transferv:latest}
    container_name: transferv
    ports:
      - "${TRANSFERV_PORT:-8080}:8080"
    environment:
      TRANSFERV_DATA_DIR: /data
    volumes:
      - ${TRANSFERV_DATA_DIR:-./data}:/data
      # Mount keys here if you want to reference them in settings.
      # - ~/.ssh:/keys:ro
    restart: unless-stopped
